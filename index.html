<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Sculpture</title>
  </head>
  <body>
    <main id="app" class="mode-classic style-vita theme-dark">
      <header class="intro" aria-label="Sound Sculpture">
        <p class="eyebrow">Sound Sculpture</p>
        <h1 id="intro-title">音で育てる生命</h1>
        <p id="intro-description" class="description">
          音を糧に、深海のような闇の中で生命体が育ちます。膜は真珠のように輝き、完成後もあなたの音の鼓動を記憶して呼吸し続けます。
        </p>
      </header>

      <aside class="control-panel-shell" id="control-panel-shell">
        <div
          id="control-panel-handle"
          class="control-panel__handle"
          role="button"
          tabindex="0"
          aria-label="操作パネルをドラッグして移動"
        >
          <span class="control-panel__handle-dots" aria-hidden="true"></span>
        </div>
        <button
          id="toggle-control-panel"
          type="button"
          class="control-panel__toggle"
          aria-expanded="true"
          aria-controls="control-panel"
        >
          <span class="control-panel__toggle-label control-panel__toggle-label--hide">パネルを隠す</span>
          <span class="control-panel__toggle-label control-panel__toggle-label--show">操作パネル</span>
        </button>
        <section class="control-panel" id="control-panel" aria-label="設定と操作">
        <details class="control-group" open>
          <summary class="control-group__summary">入力・操作</summary>
          <div class="control-group__body">
            <label class="sculpture-mode" id="experience-style-field">
              作品スタイル
              <select id="experience-style" class="sculpture-mode__select">
              </select>
            </label>
            <label class="sculpture-mode">
              成長アルゴリズム
              <select id="growth-algorithm" class="sculpture-mode__select growth-algorithm__select">
              </select>
            </label>
            <p id="growth-algorithm-hint" class="growth-algorithm-hint"></p>
            <section class="audio-scope" aria-label="Audio scope">
              <canvas id="audio-scope" width="420" height="120"></canvas>
            </section>
            <div class="actions">
              <div class="actions__row actions__row--input">
                <button
                  id="start-audio"
                  type="button"
                  data-status-preparing="マイク入力を準備中"
                  data-status-ready="形成中 - ドラッグで視点を回せます"
                >
                  マイク入力を開始
                </button>
                <button
                  id="start-system-audio"
                  type="button"
                  data-status-preparing="PC/タブ音声を準備中"
                  data-status-ready="形成中 - ドラッグで視点を回せます"
                >
                  PC/タブ音声を開始
                </button>
                <button
                  id="start-dev-audio"
                  type="button"
                  hidden
                  data-status-preparing="開発用音源を準備中"
                  data-status-ready="形成中 (s04) - ドラッグで視点を回せます"
                >
                  開発用音源 (s04)
                </button>
              </div>
              <div class="actions__row actions__row--sculpture">
                <button
                  id="reset-sculpture"
                  type="button"
                  disabled
                  data-status-reset="リセットしました - 形成を再開できます"
                >
                  リセット
                </button>
                <button
                  id="complete-sculpture"
                  type="button"
                  disabled
                  data-status-done="完成 - マウス操作とライト調整ができます"
                >
                  完了
                </button>
                <button
                  id="export-gltf"
                  type="button"
                  disabled
                  data-status-exporting="GLTF を書き出し中"
                  data-status-success="完成 - GLTF を出力しました"
                  data-status-error="GLTF 出力に失敗しました"
                >
                  GLTF 出力
                </button>
              </div>
            </div>
            <details class="band-test-panel" id="band-test-panel" hidden>
              <summary class="band-test-panel__summary">音域テスト</summary>
              <div class="band-test-panel__body">
                <p class="band-test-hint">
                  メーターで解析結果を確認し、ソロで LIVE がどの帯域だけ効いているか切り分けます。テスト音は 80Hz → 1kHz → 7kHz を順に再生します。
                </p>
                <label class="band-test-solo">
                  ソロ（LIVE 帯域の切り分け）
                  <select id="band-solo-mode" class="band-test-solo__select">
                    <option value="off">通常（全帯域）</option>
                    <option value="low">低音のみ → 全体振動</option>
                    <option value="mid">中音のみ → 表面</option>
                    <option value="high">高音のみ → 膜</option>
                  </select>
                </label>
                <button id="band-tone-test" type="button" disabled>テスト音を再生（低→中→高）</button>
              </div>
            </details>
            <details class="input-device-panel">
              <summary class="input-device-panel__summary">入力デバイス</summary>
              <div class="input-device-panel__body">
                <label class="input-device-panel__field">
                  <span class="input-device-panel__label">マイク / オーディオ入力</span>
                  <select id="audio-input-device" class="sculpture-mode__select input-device__select">
                    <option value="default">既定の入力</option>
                  </select>
                </label>
                <button
                  id="refresh-audio-devices"
                  type="button"
                  class="input-device__refresh"
                  data-status-success="入力デバイス一覧を更新しました"
                  data-status-error="入力デバイス一覧の更新に失敗しました"
                >
                  デバイス一覧を更新
                </button>
              </div>
            </details>
            <p id="status" class="status" data-status-idle="待機中">待機中</p>
          </div>
        </details>

        <details class="control-group control-group--dev">
          <summary class="control-group__summary">開発チューニング</summary>
          <div class="control-group__body">
            <p class="tuning-hint">
              6項目に整理しました。<strong>LIVE・呼吸</strong>は即時反映、<strong>形成・成長</strong>はこれからの蓄積に効きます。数値スケールは選択中の成長アルゴリズムとフィボナッチ比率です。
            </p>
            <div id="tuning-sliders" class="tuning-sliders"></div>
            <div class="tuning-export">
              <label class="tuning-export__label" for="tuning-export-text">
                調整結果（コピー用）
                <textarea id="tuning-export-text" class="tuning-export__text" rows="10" readonly></textarea>
              </label>
              <div class="tuning-export__actions">
                <button
                  id="copy-tuning"
                  type="button"
                  data-label-copied="コピーしました"
                  data-status-error="クリップボードにコピーできませんでした。テキストを手動で選択してください"
                >
                  コピー
                </button>
                <button id="reset-tuning" type="button">既定値に戻す</button>
              </div>
            </div>
          </div>
        </details>

        <details class="control-group">
          <summary class="control-group__summary">展示調整</summary>
          <div class="control-group__body">
            <fieldset id="viewer-control-fields" disabled>
              <label>
                ライト方向
                <input id="light-azimuth" type="range" min="-180" max="180" value="0" />
              </label>
              <label>
                ライト高さ
                <input id="light-elevation" type="range" min="5" max="85" value="85" />
              </label>
              <label>
                ライト強度
                <input id="light-intensity" type="range" min="1" max="7" step="0.1" value="3.4" />
              </label>
              <button id="reset-view" type="button">視点を戻す</button>
            </fieldset>
          </div>
        </details>
        </section>
      </aside>

      <canvas id="scene" aria-label="Sound reactive 3D sculpture"></canvas>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
