<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Sculpture</title>
  </head>
  <body>
    <main id="app">
      <section class="intro" aria-label="Sound Sculpture controls">
        <p class="eyebrow">Sound Sculpture</p>
        <h1>音で彫刻する</h1>
        <p class="description">
          PCに入力された音を解析し、低音の圧力を不可逆な形状変化として蓄積します。
          無音が続くと、その瞬間の形を完成作品として固定します。
        </p>
        <div class="actions">
          <button id="start-audio" type="button">音入力を開始</button>
          <button id="complete-sculpture" type="button" disabled>完了</button>
          <button id="export-gltf" type="button" disabled>GLTF 出力</button>
        </div>
        <p id="status" class="status">待機中</p>
      </section>
      <section class="viewer-controls" aria-label="Viewer controls">
        <p class="viewer-controls__title">展示調整</p>
        <fieldset id="viewer-control-fields" disabled>
          <label>
            ライト方向
            <input id="light-azimuth" type="range" min="-180" max="180" value="35" />
          </label>
          <label>
            ライト高さ
            <input id="light-elevation" type="range" min="5" max="85" value="42" />
          </label>
          <label>
            ライト強度
            <input id="light-intensity" type="range" min="1" max="7" step="0.1" value="3.4" />
          </label>
          <button id="reset-view" type="button">視点を戻す</button>
        </fieldset>
      </section>
      <canvas id="scene" aria-label="Sound reactive 3D sculpture"></canvas>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
